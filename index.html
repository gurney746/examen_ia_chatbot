<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Chatbot</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            text-align:center;
            margin-top:100px;
        }

        h1{
            color:#0f62fe;
        }
    </style>
</head>

<body>

<h1>Bienvenido</h1>

<p>Haz clic en el ícono del chat para comenzar.</p>

<script>
  window.watsonAssistantChatOptions = {
    integrationID: "ff0d64e3-b047-4b22-9f48-68924088666e", // The ID of this integration.
    region: "https://integrations.au-syd.assistant.watson.appdomain.cloud", // The region your integration is hosted in.
    serviceInstanceID: "2c8de7e2-f838-42c4-95d8-53fc0d3e18be", // The ID of your service instance.
    onLoad: async (instance) => { await instance.render(); }
  };
  setTimeout(function(){
    const t=document.createElement('script');
    t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>

</body>
</html>
